name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blogwriter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'dummy_key_for_tests' }}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/blogwriter_test
      TAVILY_API_KEY: ""
      DEBUG: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: "blog writing agent"
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_graph_nodes.py

      - name: Run model & utils tests (no API key needed)
        working-directory: "blog writing agent"
        run: python -m pytest tests/test_models.py tests/test_utils.py -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: Lint with ruff
        working-directory: "blog writing agent"
        run: ruff check app/ frontend/ tests/ --output-format=github

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: "blog writing agent"
        run: docker build -t blog-writing-agent:${{ github.sha }} .
